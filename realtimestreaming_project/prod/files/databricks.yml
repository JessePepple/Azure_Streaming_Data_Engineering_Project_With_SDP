# This is a Databricks asset bundle definition for realtimestreaming_project.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: realtimestreaming_project
  uuid: 15be5c7e-4886-43c0-b095-d472d451f491

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-2980095041369830.10.azuredatabricks.net
    permissions:
      - group_name : admins
        level : CAN_MANAGE
    presets:
      name_prefix: ${workspace.current_user.short_name}
      source_linked_deployment : false
    
    variables:
      catalog: realtime_project
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://adb-2980095041369830.10.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/jessepepple36@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/jessepepple36@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: realtime_project
      schema: prod
    permissions:
      - user_name: jessepepple36@gmail.com
        level: CAN_MANAGE
